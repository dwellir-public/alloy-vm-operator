name: alloy

type: charm

title: Grafana Alloy VM

platforms:
  ubuntu@24.04:amd64:

summary: Machine charm for Grafana Alloy on Ubuntu.

description: |
  Grafana Alloy is a vendor-neutral distribution of the OpenTelemetry Collector.

  This machine charm installs and manages Alloy on Ubuntu VMs and will expose
  integrations for sending logs to Loki, receiving syslog inputs, scraping
  Prometheus metrics, and forwarding metrics upstream over remote write.

config:
  options:
    log-level:
      description: |
        Configures the log level of the Alloy process.

        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "info"
      type: string
    config-override:
      description: |
        Full Alloy configuration file as a string. When set, this overrides the
        generated configuration entirely. Set to empty to revert to generated config.
      type: string
      default: ""
    systemd-units:
      description: |
        Comma-separated list of systemd unit names to forward to Loki
        (e.g. "ssh.service, snapd.service"). Leave empty to disable.
      type: string
      default: ""
    custom_args:
      description: |
        Custom arguments for the Alloy service.
      default: "--server.http.listen-addr=0.0.0.0:6987"
      type: string
    alloy-livedebugging:
      description: |
        Enable live debugging mode for Alloy. When enabled, the charm sets
        CUSTOM_ARGS to listen on 0.0.0.0:12345 and injects a livedebugging
        block into generated Alloy config. Disabling restores previous args.
      default: false
      type: boolean
    enable-syslogreceivers:
      description: |
        Enable Alloy syslog listeners for remote syslog ingestion. When true,
        Alloy listens on both TCP and UDP port 1514 and forwards incoming logs
        directly to Loki (without Juju topology relabeling).
      default: false
      type: boolean
    syslog-drop-access-logs:
      description: |
        Drop common request-style remote syslog lines before forwarding them to
        Loki. This is intended as a second guardrail for high-volume senders
        such as HAProxy and only affects remote syslog received through
        `syslog-receiver`.
      default: false
      type: boolean
    syslog-drop-expressions:
      description: |
        Newline-separated regular expressions to drop from remote syslog before
        forwarding to Loki. These expressions apply only to logs received
        through `syslog-receiver`.
      default: ""
      type: string
    syslog-rate-limit:
      description: |
        Maximum number of remote syslog lines per second to forward after drop
        rules are applied. Set to 0 to disable Alloy-side rate limiting.
      default: 0
      type: int
    syslog-rate-burst:
      description: |
        Maximum remote syslog burst size when `syslog-rate-limit` is enabled.
        Set to 0 to use the same value as `syslog-rate-limit`.
      default: 0
      type: int

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

requires:
  send-loki-logs:
    interface: loki_push_api
    optional: true
    description: Send logs to a Loki provider.
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: Scrape Prometheus metrics from related workloads.
  send-remote-write:
    interface: prometheus_remote_write
    optional: true
    description: Send scraped metrics to an upstream Prometheus remote write receiver.

provides:
  syslog-receiver:
    interface: syslog
    optional: true
    description: Receive syslog messages from other units.

peers:
  alloy-peers:
    interface: alloy_peers
